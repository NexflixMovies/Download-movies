<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexflix — Movie Collection</title>
  <meta name="description" content="Nexflix — Browse and download your favourite movies." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- MONETAG — paste your Monetag JS here -->
  <!-- <script src="YOUR_MONETAG_JS_URL"></script> -->

  <style>
    * { box-sizing: border-box; }
    .movie-row { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:0 16px; max-width:1200px; margin:0 auto; }
    @media(max-width:700px){ .movie-row{ grid-template-columns:repeat(2,1fr); gap:12px; padding:0 10px; } }
    .movie-card { display:flex; flex-direction:column; background:#13131f; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,0.07); transition:transform 0.2s,box-shadow 0.2s; }
    .movie-card:hover{ transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.5); }
    .poster-wrap{ position:relative; width:100%; aspect-ratio:2/3; overflow:hidden; cursor:pointer; background:#0d0d18; }
    .poster-wrap img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
    .poster-fallback{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:12px; text-align:center; }
    .poster-letter{ font-size:clamp(36px,8vw,64px); font-weight:900; color:rgba(255,255,255,0.9); line-height:1; margin-bottom:8px; }
    .movie-title-fb{ font-size:clamp(10px,2vw,14px); font-weight:700; color:#fff; }
    .movie-year-fb{ font-size:clamp(9px,1.8vw,12px); color:rgba(255,255,255,0.6); margin-top:4px; }
    .hover-overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; padding:12px; opacity:0; transition:opacity 0.2s; }
    .poster-wrap:hover .hover-overlay{ opacity:1; }
    .hover-overlay p{ color:#fff; font-size:clamp(10px,1.8vw,13px); line-height:1.5; text-align:center; margin:0; display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
    .movie-info{ padding:10px 10px 4px; flex:1; }
    .movie-info h3{ font-size:clamp(11px,2.2vw,14px); font-weight:700; color:#fff; margin:0 0 5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .movie-meta{ display:flex; align-items:center; gap:8px; font-size:clamp(10px,1.8vw,12px); color:#888; margin-bottom:4px; }
    .rating{ color:#f5c518; font-weight:600; }
    .movie-genre{ font-size:clamp(9px,1.6vw,11px); color:#666; text-transform:uppercase; letter-spacing:0.5px; }
    .btn{ display:block; margin:8px 10px 10px; padding:9px 6px; background:#e50914; color:#fff; text-align:center; text-decoration:none; border-radius:6px; font-size:clamp(10px,2vw,13px); font-weight:700; cursor:pointer; transition:background 0.15s; }
    .btn:hover{ background:#c40812; }
    .ad-banner-slot{ display:flex; align-items:center; justify-content:center; padding:16px 12px; background:#0d0d14; border-top:1px solid rgba(255,255,255,0.04); border-bottom:1px solid rgba(255,255,255,0.04); position:relative; }
    .ad-row-wrap{ display:flex; align-items:center; justify-content:center; padding:18px 12px; margin:4px 0; background:linear-gradient(180deg,rgba(13,13,20,0) 0%,rgba(13,13,20,0.95) 20%,rgba(13,13,20,0.95) 80%,rgba(13,13,20,0) 100%); position:relative; }
    .ad-row-wrap::before,.ad-row-wrap::after{ content:''; position:absolute; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent); }
    .ad-row-wrap::before{ top:0; } .ad-row-wrap::after{ bottom:0; }
    .ad-label{ position:absolute; top:5px; left:50%; transform:translateX(-50%); font-size:9px; color:rgba(255,255,255,0.18); letter-spacing:1.5px; text-transform:uppercase; white-space:nowrap; font-family:Inter,sans-serif; }
    #sticky-bottom-ad{ position:fixed; bottom:0; left:0; width:100%; z-index:9999; background:#0a0a12; border-top:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; padding:5px 0; box-shadow:0 -3px 20px rgba(0,0,0,0.7); min-height:62px; }
    #sticky-close{ position:absolute; right:10px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); color:#aaa; border:none; border-radius:50%; width:22px; height:22px; font-size:11px; cursor:pointer; line-height:22px; text-align:center; }
    body{ padding-bottom:70px; }
    #exit-overlay{ display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.85); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    #exit-overlay.show{ display:flex; }
    #exit-overlay-box{ background:#13131f; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:28px 20px 22px; text-align:center; max-width:340px; width:92%; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
    #exit-overlay-box p{ color:#999; font-size:12px; margin:0 0 14px; }
    #exit-close-btn{ position:absolute; top:10px; right:12px; background:rgba(255,255,255,0.08); border:none; color:#777; font-size:16px; width:28px; height:28px; border-radius:50%; cursor:pointer; line-height:28px; text-align:center; }
    #dl-overlay{ display:none; position:fixed; inset:0; z-index:99998; background:rgba(0,0,0,0.9); backdrop-filter:blur(6px); align-items:center; justify-content:center; }
    #dl-overlay.show{ display:flex; }
    #dl-box{ background:#13131f; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:28px 20px 22px; text-align:center; max-width:360px; width:94%; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
    #dl-box h3{ color:#fff; margin:0 0 4px; font-size:18px; }
    #dl-box .dl-sub{ color:#777; font-size:12px; margin:0 0 16px; }
    #dl-timer-row{ color:#666; font-size:13px; margin:10px 0 6px; }
    #dl-go-btn{ display:none; background:#e50914; color:#fff; border:none; border-radius:8px; padding:13px 32px; font-size:15px; font-weight:700; cursor:pointer; width:100%; margin-top:10px; }
    .section-title{ display:flex; align-items:center; gap:10px; max-width:1200px; margin:0 auto 16px; padding:0 16px; }
    .section-title h2{ font-size:clamp(16px,3vw,22px); font-weight:800; color:#fff; margin:0; }
    .section-title span{ font-size:12px; color:#555; }
    .main{ padding:24px 0 32px; }
    @media(max-width:700px){ .main{ padding:16px 0 24px; } }
  </style>

  <script src="https://quge5.com/88/tag.min.js" data-zone="241526" async data-cfasync="false"></script>
  
</head>
<body>

  <!-- ADSTERRA BANNER 1 — Sticky Bottom -->
  <div id="sticky-bottom-ad">
    <button id="sticky-close" onclick="document.getElementById('sticky-bottom-ad').style.display='none'">✕</button>
    <!-- paste Adsterra banner 1 code here -->
  </div>

  <!-- ADSTERRA BANNER 2 — Exit Intent Overlay -->
  <div id="exit-overlay">
    <div id="exit-overlay-box">
      <button id="exit-close-btn" onclick="document.getElementById('exit-overlay').classList.remove('show')">✕</button>
      <p>Before you go — check this out!</p>
      <!-- paste Adsterra banner 2 code here -->
    </div>
  </div>

  <!-- ADSTERRA BANNER 3 — Download Interstitial -->
  <div id="dl-overlay">
    <div id="dl-box">
      <h3>⬇ Preparing Download</h3>
      <p class="dl-sub">Please wait while we prepare your file...</p>
      <!-- paste Adsterra banner 3 code here -->
      <div id="dl-timer-row">Download starts in <span id="dl-sec">5</span>s...</div>
      <button id="dl-go-btn" onclick="startDownload()">⬇ Download Now</button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="logo">NEXFLIX</a>
    <span class="header-right" id="movie-count"></span>
  </header>

  <!-- ADSTERRA BANNER 4 — Below Header -->
  <div class="ad-banner-slot">
    <span class="ad-label">Advertisement</span>
    <!-- paste Adsterra banner 4 code here -->
  </div>

  <div class="hero">
    <h1>Your Movie <span>Collection</span></h1>
    <p>Browse &amp; download your favourite movies</p>
  </div>

  <main class="main">
    <div class="section-title">
      <h2>🎬 All Movies</h2>
      <span id="title-count"></span>
    </div>
    <div id="movie-grid"></div>
  </main>

  <!-- ADSTERRA BANNER 5 — Below Grid -->
  <div class="ad-banner-slot" style="padding:20px 12px;">
    <span class="ad-label">Advertisement</span>
    <!-- paste Adsterra banner 5 code here -->
  </div>

  <footer>
    <p><span>NEXFLIX</span> — Your Movie Collection</p>
  </footer>

  <script src="movies.js"></script>
  <script>
    const bgColors = ["#1a3a6b","#0d2b4a","#1b4f8a","#0a2240","#163460","#0e3060","#1d4580","#0c2850"];
    document.getElementById('movie-count').textContent = '🎬 ' + movies.length + ' Movies';
    document.getElementById('title-count').textContent = movies.length + ' titles';

    const grid = document.getElementById('movie-grid');
    let html = '', _dlTarget = '';

    for (let i = 0; i < movies.length; i += 3) {
      const row = movies.slice(i, i + 3);
      html += '<div class="movie-row">';
      row.forEach(m => {
        const bg = bgColors[(m.id - 1) % bgColors.length];
        html += `
          <div class="movie-card">
            <div class="poster-wrap" onclick="openDlInterstitial('download.html?id=${m.id}')">
              <img src="${m.poster}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" loading="lazy" />
              <div class="poster-fallback" style="background:${bg};display:none;">
                <div class="poster-letter">${m.title.charAt(0)}</div>
                <div class="movie-title-fb">${m.title}</div>
                <div class="movie-year-fb">${m.year}</div>
              </div>
              <div class="hover-overlay"><p>${m.description}</p></div>
            </div>
            <div class="movie-info">
              <h3>${m.title}</h3>
              <div class="movie-meta"><span>${m.year}</span><span class="rating">★ ${m.rating}</span></div>
              <div class="movie-genre">${m.genre}</div>
            </div>
            <a class="btn" onclick="openDlInterstitial('download.html?id=${m.id}');return false;" href="#">⬇ Download Movie</a>
          </div>`;
      });
      html += '</div>';
      html += `<div class="ad-row-wrap"><span class="ad-label">Advertisement</span></div>`;
    }

    grid.innerHTML = html;

    let _dlTimer = null;
    function openDlInterstitial(url) {
      _dlTarget = url;
      const overlay = document.getElementById('dl-overlay');
      const secEl = document.getElementById('dl-sec');
      const timerRow = document.getElementById('dl-timer-row');
      const goBtn = document.getElementById('dl-go-btn');
      goBtn.style.display = 'none';
      timerRow.style.display = 'block';
      secEl.textContent = 5;
      overlay.classList.add('show');
      let count = 5;
      clearInterval(_dlTimer);
      _dlTimer = setInterval(() => {
        count--;
        secEl.textContent = count;
        if (count <= 0) { clearInterval(_dlTimer); timerRow.style.display = 'none'; goBtn.style.display = 'block'; }
      }, 1000);
    }
    function startDownload() {
      document.getElementById('dl-overlay').classList.remove('show');
      location.href = _dlTarget;
    }
    document.getElementById('dl-overlay').addEventListener('click', function(e) {
      if (e.target === this) { clearInterval(_dlTimer); this.classList.remove('show'); }
    });

    let _exitShown = false;
    document.addEventListener('mouseleave', function(e) {
      if (e.clientY <= 0 && !_exitShown) { _exitShown = true; document.getElementById('exit-overlay').classList.add('show'); }
    });
    document.getElementById('exit-overlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('show');
    });
  </script>
</body>
</html>
