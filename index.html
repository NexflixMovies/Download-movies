  <style>
    /* ═══════════════════════════════════════
       RESPONSIVE MOVIE GRID
    ═══════════════════════════════════════ */
    * { box-sizing: border-box; }

    .movie-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 0 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 700px) {
      .movie-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 10px;
      }
    }

    .movie-card {
      display: flex;
      flex-direction: column;
      background: #13131f;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .movie-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    /* Fixed 2:3 movie poster ratio — same on ALL screen sizes */
    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      cursor: pointer;
      background: #0d0d18;
    }
    .poster-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .poster-fallback {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      text-align: center;
    }
    .poster-letter {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      line-height: 1;
      margin-bottom: 8px;
    }
    .movie-title-fb {
      font-size: clamp(10px, 2vw, 14px);
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .movie-year-fb {
      font-size: clamp(9px, 1.8vw, 12px);
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .hover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .poster-wrap:hover .hover-overlay { opacity: 1; }
    .hover-overlay p {
      color: #fff;
      font-size: clamp(10px, 1.8vw, 13px);
      line-height: 1.5;
      text-align: center;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;

    .movie-info { padding: 10px 10px 4px; flex: 1; }
    .movie-info h3 {
      font-size: clamp(11px, 2.2vw, 14px);
      font-weight: 700;
      color: #fff;
      margin: 0 0 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

    .movie-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(10px, 1.8vw, 12px);
      color: #888;
      margin-bottom: 4px;

    .rating { color: #f5c518; font-weight: 600; }

  <script>
    const bgColors = ["#1a3a6b","#0d2b4a","#1b4f8a","#0a2240","#163460","#0e3060","#1d4580","#0c2850"];

    document.getElementById('movie-count').textContent = '🎬 ' + movies.length + ' Movies';
    document.getElementById('title-count').textContent = movies.length + ' titles';

    // ONE ad per row — smart size per screen
    function rowAd(rowIndex) {
      const type = rowIndex % 3;
      if (type === 0) {
        return `<div class="ad-row-wrap">
          <span class="ad-label">Advertisement</span>
          <div class="ad-desktop">
            <script>atOptions={'key':'bfb74bec0e3ae8c2d4aa4e7098b8801f','format':'iframe','height':90,'width':728,'params':{}}<\/script>
            <script src="https://www.highperformanceformat.com/bfb74bec0e3ae8c2d4aa4e7098b8801f/invoke.js"><\/script>
          </div>
          <div class="ad-mobile">
            <script>atOptions={'key':'53c7cf734ecaad9717bb019ff323c97c','format':'iframe','height':50,'width':320,'params':{}}<\/script>
            <script src="https://www.highperformanceformat.com/53c7cf734ecaad9717bb019ff323c97c/invoke.js"><\/script>
          </div>
        </div>`;
      } else if (type === 1) {
        return `<div class="ad-row-wrap">
          <span class="ad-label">Advertisement</span>
          <script>atOptions={'key':'238a2051f1250c6dfb14686280350c4d','format':'iframe','height':250,'width':300,'params':{}}<\/script>
          <script src="https://www.highperformanceformat.com/238a2051f1250c6dfb14686280350c4d/invoke.js"><\/script>
        </div>`;
      } else {
        return `<div class="ad-row-wrap">
          <span class="ad-label">Advertisement</span>
          <script>atOptions={'key':'53c7cf734ecaad9717bb019ff323c97c','format':'iframe','height':50,'width':320,'params':{}}<\/script>
          <script src="https://www.highperformanceformat.com/53c7cf734ecaad9717bb019ff323c97c/invoke.js"><\/script>
        </div>`;
      }
    }

    const grid = document.getElementById('movie-grid');
    let html = '';
    let _dlTarget = '';

    for (let i = 0; i < movies.length; i += 3) {
      const row = movies.slice(i, i + 3);
      html += '<div class="movie-row">';
      row.forEach(m => {
        const bg = bgColors[(m.id - 1) % bgColors.length];
        html += `
          <div class="movie-card">
            <div class="poster-wrap" onclick="openDlInterstitial('download.html?id=${m.id}')">
              <img src="${m.poster}" alt="${m.title}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
                loading="lazy" />
              <div class="poster-fallback" style="background:${bg};display:none;">
                <div class="poster-letter">${m.title.charAt(0)}</div>
                <div class="movie-title-fb">${m.title}</div>
                <div class="movie-year-fb">${m.year}</div>
              </div>
              <div class="hover-overlay"><p>${m.description}</p></div>
            </div>
            <div class="movie-info">
              <h3>${m.title}</h3>
              <div class="movie-meta">
                <span>${m.year}</span>
                <span class="rating">★ ${m.rating}</span>
              </div>
              <div class="movie-genre">${m.genre}</div>
            </div>
            <a class="btn" onclick="openDlInterstitial('download.html?id=${m.id}');return false;" href="#">⬇ Download Movie</a>
          </div>`;
      });
      html += '</div>';
      html += rowAd(Math.floor(i / 3));
    }

    grid.innerHTML = html;

    grid.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) { s.src = old.src; s.async = true; }
      else { s.text = old.text; }
      document.body.appendChild(s);
    });

    // DOWNLOAD INTERSTITIAL
    let _dlTimer = null;
    function openDlInterstitial(url) {
      _dlTarget = url;
      const overlay  = document.getElementById('dl-overlay');
      const secEl    = document.getElementById('dl-sec');
      const timerRow = document.getElementById('dl-timer-row');
      const goBtn    = document.getElementById('dl-go-btn');
      goBtn.style.display = 'none';
      timerRow.style.display = 'block';
      secEl.textContent = 5;
      overlay.classList.add('show');
      let count = 5;
      clearInterval(_dlTimer);
      _dlTimer = setInterval(() => {
        count--;
        secEl.textContent = count;
        if (count <= 0) {
          clearInterval(_dlTimer);
          timerRow.style.display = 'none';
          goBtn.style.display = 'block';
        }
      }, 1000);
    }
    function startDownload() {
      document.getElementById('dl-overlay').classList.remove('show');
      location.href = _dlTarget;
    }
    document.getElementById('dl-overlay').addEventListener('click', function(e) {
      if (e.target === this) { clearInterval(_dlTimer); this.classList.remove('show'); }
    });

    // EXIT-INTENT
    let _exitShown = false;
    document.addEventListener('mouseleave', function(e) {
      if (e.clientY <= 0 && !_exitShown) {
        _exitShown = true;
        document.getElementById('exit-overlay').classList.add('show');
      }
    });
    document.getElementById('exit-overlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('show');
    });

    // AUTO-REFRESH ads every 45s
    setInterval(() => {
      document.querySelectorAll('iframe').forEach(f => {
        try { f.src = f.src; } catch(e) {}
      });
    }, 45000);
  </script>
