</head>
<body>

  <!-- HERO -->
  <div class="hero">

  <!-- effectivecpmnetwork native container (once) -->
  <div class="ad-block" style="padding:12px 0;">

    <div id="container-3f93cd4234bed8f74d81b381aa309ea4"></div>
  </div>

  <!-- 728x90 leaderboard below hero -->
  <div class="ad-block" style="padding:8px 0;">
    <script>atOptions={'key':'bfb74bec0e3ae8c2d4aa4e7098b8801f','format':'iframe','height':90,'width':728,'params':{}};</script>
    <script src="https://www.highperformanceformat.com/bfb74bec0e3ae8c2d4aa4e7098b8801f/invoke.js"></script>

  <!-- 300x250 below hero -->
  <div class="ad-block" style="padding:8px 0;">

    <script src="https://www.highperformanceformat.com/238a2051f1250c6dfb14686280350c4d/invoke.js"></script>
  </div>

  <!-- MAIN: movie grid injected here -->
  <main class="main">
    <div class="section-title">
      <h2>🎬 All Movies</h2>
      <span id="title-count"></span>
    </div>
    <div id="movie-grid"></div>
  </main>

  <!-- 300x250 after grid -->
  <div class="ad-block" style="padding:12px 0;">
    <script>atOptions={'key':'238a2051f1250c6dfb14686280350c4d','format':'iframe','height':250,'width':300,'params':{}};</script>
    <script src="https://www.highperformanceformat.com/238a2051f1250c6dfb14686280350c4d/invoke.js"></script>
  </div>

  <!-- 320x50 before footer -->
  <div class="ad-block" style="padding:6px 0;">
    <script>atOptions={'key':'53c7cf734ecaad9717bb019ff323c97c','format':'iframe','height':50,'width':320,'params':{}};</script>
    <script src="https://www.highperformanceformat.com/53c7cf734ecaad9717bb019ff323c97c/invoke.js"></script>
  </div>

  <footer>
    <p><span>NEXFLIX</span> — Your Movie Collection</p>
  </footer>

  <script src="movies.js"></script>
  <script>
    const bgColors = ["#1a3a6b","#0d2b4a","#1b4f8a","#0a2240","#163460","#0e3060","#1d4580","#0c2850"];

    document.getElementById('movie-count').textContent = '🎬 ' + movies.length + ' Movies';
    document.getElementById('title-count').textContent = movies.length + ' titles';

    // Ad HTML that cycles per row (returns different ad each row)
    function rowAd(rowIndex) {
      const type = rowIndex % 4;
      if (type === 0) {
        return `<div class="ad-block-bg"><div class="ad-block">
          <script>atOptions={'key':'bfb74bec0e3ae8c2d4aa4e7098b8801f','format':'iframe','height':90,'width':728,'params':{}}<\/script>
          <script src="https://www.highperformanceformat.com/bfb74bec0e3ae8c2d4aa4e7098b8801f/invoke.js"><\/script>
        </div></div>`;
      } else if (type === 1) {
        return `<div class="ad-block-bg"><div class="ad-block">
          <script>atOptions={'key':'238a2051f1250c6dfb14686280350c4d','format':'iframe','height':250,'width':300,'params':{}}<\/script>
          <script src="https://www.highperformanceformat.com/238a2051f1250c6dfb14686280350c4d/invoke.js"><\/script>
        </div></div>`;
      } else if (type === 2) {
        return `<div class="ad-block-bg"><div class="ad-block">
          <script>atOptions={'key':'53c7cf734ecaad9717bb019ff323c97c','format':'iframe','height':50,'width':320,'params':{}}<\/script>
          <script src="https://www.highperformanceformat.com/53c7cf734ecaad9717bb019ff323c97c/invoke.js"><\/script>
        </div></div>`;
      } else {
        return `<div class="ad-block-bg"><div class="ad-block" style="min-height:60px;"></div></div>`;
      }
    }

    const grid = document.getElementById('movie-grid');
    let html = '';

    for (let i = 0; i < movies.length; i += 3) {
      const row = movies.slice(i, i + 3);
      html += '<div class="movie-row">';
      row.forEach(m => {
        const bg = bgColors[(m.id - 1) % bgColors.length];
        html += `
          <div class="movie-card" onclick="location.href='download.html?id=${m.id}'">
            <div class="poster-wrap">
              <img src="${m.poster}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" loading="lazy" />
              <div class="poster-fallback" style="background:${bg};display:none;">
                <div class="poster-letter">${m.title.charAt(0)}</div>
                <div class="movie-title-fb">${m.title}</div>
                <div class="movie-year-fb">${m.year}</div>
              </div>
              <div class="hover-overlay">
                <p>${m.description}</p>
              </div>
            </div>
            <div class="movie-info">
              <h3>${m.title}</h3>
              <div class="movie-meta">
                <span>${m.year}</span>
                <span class="rating">★ ${m.rating}</span>
              </div>
              <div class="movie-genre">${m.genre}</div>
            </div>
            <a href="download.html?id=${m.id}" class="btn">⬇ Download Movie</a>
          </div>`;
      });
      html += '</div>';
      html += rowAd(Math.floor(i / 3));
    }

    grid.innerHTML = html;

    // Re-execute inline scripts added via innerHTML (browsers don't auto-run them)
    grid.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) { s.src = old.src; s.async = true; }
      else { s.text = old.text; }
      document.body.appendChild(s);
    });
  </script>
</body>
</html>
